<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" fill="none">
  <title>CVOptimiza — Tu CV adaptado a cada oferta, compatible con ATS</title>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0F172A"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Accent glow — top right -->
  <ellipse cx="1050" cy="120" rx="320" ry="200" fill="rgba(29,78,216,0.18)"/>
  <!-- Accent glow — bottom left -->
  <ellipse cx="200" cy="520" rx="280" ry="180" fill="rgba(5,150,105,0.12)"/>

  <!-- Isotipo grande — centrado verticalmente, alineado a la izquierda del bloque de texto -->
  <g transform="translate(100, 200)">
    <rect width="120" height="120" rx="28" fill="#1E3A5F"/>
    <!-- C -->
    <path d="M70 33 C46.7 33 33 45 33 60 C33 75 46.7 87 70 87"
          stroke="white" stroke-width="11.5" stroke-linecap="round" fill="none"/>
    <!-- V -->
    <path d="M76.7 33 L90 60 L76.7 87"
          stroke="#059669" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Wordmark -->
  <text x="100" y="378"
        font-family="'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="58" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#60a5fa">CV</tspan><tspan fill="white">Optimiza</tspan>
  </text>

  <!-- Tagline principal -->
  <text x="100" y="434"
        font-family="'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="400" fill="rgba(255,255,255,0.65)" letter-spacing="-0.3">
    Tu CV habla. ¿Le habla a esta oferta?
  </text>

  <!-- Divider line -->
  <line x1="100" y1="470" x2="1100" y2="470" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Pills / proof points -->
  <!-- Pill 1 -->
  <rect x="100" y="492" width="200" height="38" rx="19" fill="rgba(29,78,216,0.25)" stroke="rgba(96,165,250,0.3)" stroke-width="1"/>
  <text x="200" y="516" text-anchor="middle"
        font-family="'Plus Jakarta Sans', -apple-system, sans-serif"
        font-size="15" font-weight="600" fill="#93c5fd">En español</text>

  <!-- Pill 2 -->
  <rect x="316" y="492" width="220" height="38" rx="19" fill="rgba(5,150,105,0.2)" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
  <text x="426" y="516" text-anchor="middle"
        font-family="'Plus Jakarta Sans', -apple-system, sans-serif"
        font-size="15" font-weight="600" fill="#34d399">Mercado chileno</text>

  <!-- Pill 3 -->
  <rect x="552" y="492" width="180" height="38" rx="19" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="642" y="516" text-anchor="middle"
        font-family="'Plus Jakarta Sans', -apple-system, sans-serif"
        font-size="15" font-weight="600" fill="rgba(255,255,255,0.7)">Gratis</text>

  <!-- URL / branding bottom right -->
  <text x="1100" y="580" text-anchor="end"
        font-family="'Plus Jakarta Sans', -apple-system, sans-serif"
        font-size="16" font-weight="500" fill="rgba(255,255,255,0.3)">cvoptimiza.cl</text>
</svg>
